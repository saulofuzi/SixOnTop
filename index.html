<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SixOnTop – Clã Minecraft</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ====== HERO ====== -->
  <section id="hero" class="hero">
    <div class="hero-content">
      <h1 id="hero-titulo"></h1>
      <p id="hero-subtitulo"></p>
    </div>
  </section>

  <!-- ====== SOBRE ====== -->
  <section id="sobre" class="sobre">
    <div class="container">
      <h2 id="sobre-titulo"></h2>
      <div id="sobre-texto" class="sobre-texto"></div>
      <img id="sobre-imagem" src="" alt="Sobre o clã" class="sobre-img" />
    </div>
  </section>

  <!-- ====== MEMBROS ====== -->
  <section id="membros" class="membros">
    <div class="container">
      <h2 id="membros-titulo"></h2>
      <div id="membros-lista" class="membros-grid"></div>
    </div>
  </section>

  <!-- ====== CONQUISTAS ====== -->
  <section id="conquistas" class="conquistas">
    <div class="container">
      <h2 id="conquistas-titulo"></h2>
      <ul id="conquistas-lista" class="conquistas-lista"></ul>
    </div>
  </section>

  <!-- ====== CONTATO ====== -->
  <section id="contato" class="contato">
    <div class="container">
      <h2 id="contato-titulo"></h2>
      <p id="contato-texto"></p>
      <div class="contato-links">
        <a id="contato-discord" href="#" target="_blank">Discord</a>
        <a id="contato-instagram" href="#" target="_blank">Instagram</a>
        <a id="contato-email" href="#">E-mail</a>
      </div>
    </div>
  </section>

  <!-- ====== RODAPÉ ====== -->
  <footer>
    <p id="rodape-texto"></p>
  </footer>

  <!-- Carrega os dados e o script -->
  <script src="dados.js"></script>
  <script src="script.js"></script>
</body>
</html>
